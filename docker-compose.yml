services:
  db:
    image: postgres:16
    container_name: booking-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  bot:
    build: .
    container_name: booking-bot
    restart: always
    depends_on:
      - db
    env_file:
      - .env

volumes:
  postgres_data: